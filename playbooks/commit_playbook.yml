---
- name: Commit generated remediation playbook to Git repository
  hosts: "{{ report_server_host }}"
  gather_facts: false
  become: false
  collections:
    - community.scap_hardening

  tasks:
    - name: Configure git identity on report server
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: "user.name",  value: "{{ git_author_name }}" }
        - { name: "user.email", value: "{{ git_author_email }}" }

    - name: Stage generated remediation playbook
      ansible.builtin.command:
        cmd: "git add generated/{{ customer_id }}/"
        chdir: "{{ git_repo_path }}"
      changed_when: true

    - name: Commit generated playbook
      ansible.builtin.command:
        cmd: >
          git commit -m
          "[compliance] {{ customer_id }}/{{ inventory_hostname }}
          {{ scan_date }} - {{ parse_results_failed_count | default('unknown') }} rules"
        chdir: "{{ git_repo_path }}"
      changed_when: true
      register: git_commit_result
      failed_when: >
        git_commit_result.rc != 0 and
        'nothing to commit' not in git_commit_result.stdout

    - name: Push to remote
      ansible.builtin.command:
        cmd: "git push origin {{ git_branch }}"
        chdir: "{{ git_repo_path }}"
      changed_when: true
