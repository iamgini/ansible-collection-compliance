---
ansible-navigator:
  ansible:
    doc:
      plugin:
        name: shell
        type: become
    inventory:
      entries:
      - hosts.ini
    playbook:
      path: playbooks/scan.yml
  color:
    enable: true
    osc4: true
  editor:
    command: vim
    console: false
  execution-environment:
    container-engine: podman
    enabled: true
    environment-variables:
      pass:
      - ANSIBLE_FORCE_COLOR
      - TERM
    image: compliance-scanner-ee:latest
    pull:
      policy: missing
    volume-mounts:
    - dest: /tmp/oscap_results
      options: Z
      src: $PWD/generated
  logging:
    append: false
    file: /tmp/ansible-navigator.log
    level: info
  mode: stdout
  playbook-artifact:
    enable: true
    replay: /tmp/playbook-artifacts/{playbook_name}-artifact-{ts_utc}.json
    save-as: /tmp/playbook-artifacts/{playbook_name}-artifact-{time_stamp}.json
  time-zone: UTC
