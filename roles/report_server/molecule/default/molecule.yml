---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: report-server-rocky9
    image: docker.io/geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
      roles_path: /home/gmadappa/ansible/ansible-collection-compliance/roles
  playbooks:
    converge: converge.yml
verifier:
  name: ansible
