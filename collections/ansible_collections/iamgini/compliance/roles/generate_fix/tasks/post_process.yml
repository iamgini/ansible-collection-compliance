---
# Post-process raw oscap-generated playbook
# Variables expected: raw_playbook_path, final_playbook_path, process_delegate

- name: Read raw generated playbook
  ansible.builtin.slurp:
    src: "{{ raw_playbook_path }}"
  delegate_to: "{{ process_delegate }}"
  register: raw_playbook_content

- name: Decode playbook content
  ansible.builtin.set_fact:
    raw_playbook_text: "{{ raw_playbook_content.content | b64decode }}"

- name: Prepare post-processed playbook with header and become directive
  ansible.builtin.set_fact:
    processed_playbook: |
      ---
      # Generated by iamgini.compliance collection
      # Source: OpenSCAP generate fix
      # Generated at: {{ ansible_date_time.iso8601 }}
      # Customer: {{ customer_id }}
      # Hostname: {{ inventory_hostname }}
      # Profile: {{ cis_profile }}
      #
      # IMPORTANT: Review this playbook before execution
      # Apply exceptions using --skip-tags or by setting compliance_skip_rules
      #
      # Required collections:
      # - ansible.posix
      # - community.general
      #
      {{ raw_playbook_text }}

- name: Write post-processed playbook
  ansible.builtin.copy:
    content: "{{ processed_playbook }}"
    dest: "{{ final_playbook_path }}"
    mode: '0644'
  delegate_to: "{{ process_delegate }}"

- name: Set fact for generated playbook path
  ansible.builtin.set_fact:
    generate_fix_playbook_path: "{{ report_server_base_dir }}/{{ customer_id }}/{{ inventory_hostname }}/{{ scan_dir }}/{{ remediation_final_filename }}"

- name: Display generation summary
  ansible.builtin.debug:
    msg: >
      Remediation playbook generated for {{ inventory_hostname }}.
      Mode: {{ generate_fix_mode }}.
      Path: {{ generate_fix_playbook_path }}
