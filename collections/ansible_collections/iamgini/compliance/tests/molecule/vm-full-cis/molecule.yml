---
dependency:
  name: galaxy
  options:
    requirements-file: collections/requirements.yml

driver:
  name: vagrant
  provider:
    name: libvirt
  provision: false
  cachier: machine
  parallel: true

platforms:
  - name: rhel9-cis-vm
    box: generic/rhel9
    memory: 2048
    cpus: 2
    provider_options:
      cpu_mode: 'host-passthrough'
      volume_cache: 'unsafe'
      disk_bus: 'virtio'
    config_options:
      ssh.keep_alive: true
      ssh.remote_user: 'vagrant'
    groups:
      - cis_targets

  - name: rhel8-cis-vm
    box: generic/rhel8
    memory: 2048
    cpus: 2
    provider_options:
      cpu_mode: 'host-passthrough'
      volume_cache: 'unsafe'
      disk_bus: 'virtio'
    config_options:
      ssh.keep_alive: true
      ssh.remote_user: 'vagrant'
    groups:
      - cis_targets

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer
      gathering: smart
      fact_caching: jsonfile
      fact_caching_connection: /tmp/molecule_facts
      fact_caching_timeout: 3600
  inventory:
    group_vars:
      all:
        customer_id: molecule-vm-test
        report_server_host: localhost
        report_server_base_dir: /tmp/cis_reports
        # OpenSCAP scan settings
        oscap_profile: xccdf_org.ssgproject.content_profile_cis
        oscap_policy: cis
      cis_targets:
        # CIS-specific variables for full benchmark testing
        enable_kernel_tests: true
        enable_partition_tests: true
        enable_bootloader_tests: true

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
  create_sequence:
    - dependency
    - create
    - prepare
  converge_sequence:
    - dependency
    - create
    - prepare
    - converge
  destroy_sequence:
    - cleanup
    - destroy
